# mods.toml — Forge mod metadata for Minecraft 1.20.1 / Forge 47.x
modLoader="javafml"
loaderVersion="[47,)"
license="MIT"
issueTrackerURL="https://github.com/Yaetrna/Minecraft-LLM-Chat-Integration-/issues"

[[mods]]
modId="llmchat"
version="${mod_version}"
displayName="LLM Chat"
authors="Yaetrna"
description='''
Forward in-game chat messages to an LLM (via OpenRouter) by mentioning a configured name
like @Grok or @AI. The AI's reply is broadcast to the whole server. Server-side only.
'''

# This mod runs on the SERVER. We mark client display as optional so it doesn't
# force clients to install it. The 'side="SERVER"' on the Forge dependency is the
# key part that makes this purely server-side.
[[dependencies.llmchat]]
    modId="forge"
    mandatory=true
    versionRange="[47,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.llmchat]]
    modId="minecraft"
    mandatory=true
    versionRange="[1.20.1,1.21)"
    ordering="NONE"
    side="BOTH"
